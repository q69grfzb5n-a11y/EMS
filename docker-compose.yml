services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      APP_ENV: ${APP_ENV}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE}
    # Read-only, needed for the one-time initial seed/import
    # (`scripts/seed.py --core`, `scripts/import_legacy.py`) — not mounted for
    # routine operation, but seeding a fresh prod deployment needs the real
    # source workbook, same as the dev profile already provides.
    volumes:
      - ./docs:/docs:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Automated daily backups so a real deployment doesn't depend on someone
  # remembering to run scripts/backup_db.sh manually. Connects to postgres
  # directly over the compose network (no docker socket needed) — see
  # scripts/backup_loop.sh. Manual backup_db.sh/.ps1 + restore_db.sh/.ps1
  # still exist for on-demand backups and restores (see docs/deployment.md).
  backup:
    image: postgres:16-alpine
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
      - ./scripts/backup_loop.sh:/backup_loop.sh:ro
    entrypoint: ["/bin/sh", "/backup_loop.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"
      - "443:443"
    # Real cert files, generated by scripts/generate_dev_tls_cert.sh for local
    # testing — for a real deployment, replace certs/localhost.{crt,key} with
    # a real certificate at the same path; nginx.conf doesn't need to change.
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
