repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: check-line-limits
        name: check line limits
        entry: python3 scripts/check_line_limits.py
        language: system
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: npx --prefix frontend prettier --write
        language: system
        files: ^frontend/.*\.(ts|tsx|json|css)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: trailing-whitespace
