services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      target: dev
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_venv:
  frontend_node_modules:
